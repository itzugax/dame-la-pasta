<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TV — EL SHOW</title>
    <!-- Preconexiones para reducir latencia -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdn.ably.com">
    <link rel="preconnect" href="https://realtime.ably.io">
    <!-- Fuentes con display=swap para no bloquear el render -->
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@900&display=swap" rel="stylesheet">
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
    <style>
        :root {
            --bg:   #0a0e6e;
            --cell: #1a22b8;
            --border: #00aaff;
            --gold: #f5c518;
            --green: #00ff88;
            --red:  #ff3131;
            --p0: #a020f0; --p1: #ff69b4; --p2: #4488ff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            width: 100%; height: 100%;
            background: var(--bg);
            font-family: 'Bebas Neue', 'Arial Black', sans-serif;
            color: white; overflow: hidden;
            display: flex; flex-direction: column;
        }

        /* TABLERO */
        #main-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: clamp(4px, 0.8vw, 12px);
            padding: clamp(6px, 1.2vw, 20px);
            flex: 1; min-height: 0;
        }
        .col-cat { display: flex; flex-direction: column; gap: clamp(4px, 0.6vh, 10px); min-height: 0; }
        .cat-header {
            background: var(--bg);
            color: white;
            text-align: center;
            font-size: clamp(0.9rem, 2vw, 2.2rem);
            padding: 0.8vh 0.3vw;
            line-height: 1.1;
            flex-shrink: 0;
        }
        .q-cell {
            background: var(--cell);
            border: 3px solid var(--border);
            border-radius: clamp(6px, 1vw, 16px);
            color: var(--gold);
            font-size: clamp(1rem, 3.5vw, 4.5rem);
            flex: 1; min-height: 0;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 10px rgba(0,170,255,0.3), inset 0 0 20px rgba(0,0,80,0.5);
            transition: 0.4s;
        }
        .q-cell.used { opacity: 0.18; pointer-events: none; filter: grayscale(0.4); }

        /* MARCADORES */
        #scores-bar {
            display: flex; justify-content: center; gap: 3vw;
            padding: clamp(8px, 1.5vh, 20px) 2vw;
            background: #06094a;
            border-top: 3px solid var(--border);
            flex-shrink: 0;
        }
        .p-card {
            background: var(--cell); border-radius: 16px;
            padding: 1vh 0; text-align: center;
            border: 3px solid var(--border);
            box-shadow: 0 0 18px rgba(0,170,255,0.35);
            flex: 1; max-width: 28vw;
        }
        .p-card div {
            font-size: clamp(0.75rem, 1.4vw, 1.6rem);
            color: white; letter-spacing: 2px;
            text-shadow: 0 0 8px rgba(255,255,255,0.4);
            padding: 0 0.5vw;
        }
        .p-card span {
            font-size: clamp(2rem, 5vw, 6rem);
            color: var(--gold); font-weight: 900; display: block;
            text-shadow: 0 0 15px rgba(245,197,24,0.5);
        }
        .p-card span.negative { color: #ff3131; text-shadow: 0 0 15px rgba(255,49,49,0.5); }

        /* ESCENA PREGUNTA */
        #scene-question {
            position: fixed; inset: 0; z-index: 1000;
            background: radial-gradient(ellipse at center, #0d1580 0%, #04063a 100%);
            display: none; flex-direction: column;
            align-items: center; justify-content: center;
        }
        #scene-question.active { display: flex; animation: fadeIn 0.4s; }

        #q-pts-bg {
            position: absolute;
            font-size: clamp(8rem, 40vw, 40rem);
            color: rgba(255,255,255,0.07);
            font-family: 'Inter'; pointer-events: none;
        }
        #splash-cat {
            font-size: clamp(1.5rem, 4vw, 5rem);
            color: var(--gold); text-align: center;
            text-shadow: 0 0 20px rgba(245,197,24,0.5);
            margin-bottom: 3vh; z-index: 2; width: 100%; padding: 0 4vw;
        }
        .cat-mini { font-size: clamp(1rem, 2.5vw, 3rem) !important; position: absolute; top: 2vh; }

        #q-content {
            display: none; flex-direction: column;
            align-items: center; width: 100%; z-index: 2; padding: 0 5vw;
        }
        #q-text {
            font-size: clamp(1.4rem, 4vw, 5rem);
            line-height: 1.15; text-align: center;
            margin-bottom: 3vh;
            text-shadow: 0 3px 15px rgba(0,0,0,0.8);
            animation: slideInUp 0.6s ease-out;
        }

        /* OPCIONES 2x2 */
        #opciones-box { display: none; width: 100%; align-items: center; flex-direction: column; }
        #opciones-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 1.5vh 2vw; width: 82%;
        }
        .op-card {
            background: var(--cell);
            border: 3px solid var(--border);
            border-radius: 16px;
            padding: 1.2vh 2vw;
            font-size: clamp(0.85rem, 2vw, 2.5rem);
            text-align: center;
            box-shadow: 0 0 10px rgba(0,170,255,0.2);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: slideInOps 0.5s ease forwards;
        }
        .op-letter { color: var(--gold); font-weight: 900; margin-right: 0.3em; }
        .op-center { border-color: var(--gold) !important; box-shadow: 0 0 40px rgba(245,197,24,0.6); transform: scale(1.06); }
        .op-out    { opacity: 0.15; transform: scale(0.92); }

        /* QUIEN PULSÓ */
        #who-pressed {
            position: absolute; bottom: 6vh;
            left: 50%; transform: translateX(-50%);
            font-size: clamp(2rem, 6vw, 7rem);
            font-weight: 900; z-index: 5000;
            opacity: 0; white-space: nowrap;
            transition: opacity 0.4s;
            text-shadow: 0 0 30px currentColor;
        }
        #who-pressed.show-name { opacity: 1; }

        /* TIMER */
        #timer-display {
            position: absolute; top: 10vh; left: 50%; transform: translateX(-50%);
            font-size: clamp(2rem, 5vw, 6rem); color: var(--gold);
            font-family: 'Inter'; font-weight: 900;
            text-shadow: 0 0 20px rgba(245,197,24,0.5);
            z-index: 500; display: none; pointer-events: none;
            text-align: center;
        }
        #timer-bar-wrap {
            position: absolute; top: calc(10vh + clamp(2rem,5vw,6rem) + 1.5vh);
            left: 50%; transform: translateX(-50%);
            width: 70%; height: clamp(14px, 2.2vh, 28px);
            background: rgba(255,255,255,0.08);
            border-radius: 4px; overflow: hidden;
            z-index: 500; display: none;
        }
        #timer-bar {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, #fff8a0, var(--gold), #ffaa00);
            border-radius: 4px;
            box-shadow: 0 0 24px var(--gold), 0 0 48px rgba(245,197,24,0.7), 0 0 80px rgba(245,197,24,0.3);
            transition: width 0.9s linear, background 0.5s, box-shadow 0.5s;
        }

        /* FEEDBACK */
        #feedback-wrap {
            position: fixed; inset: 0; z-index: 9999;
            display: none; align-items: center; justify-content: center;
            transition: background 0.3s;
        }
        #fb-text { font-size: clamp(4rem, 14vw, 16rem); font-family: 'Bebas Neue'; }
        .fb-correct { background: #3CFF00 !important; box-shadow: inset 0 0 100px rgba(60,255,0,0.3); }
        .fb-wrong   { background: #FF0000 !important; box-shadow: inset 0 0 100px rgba(255,0,0,0.3); }

        /* COMODÍN */
        #comodin-overlay {
            position: fixed; inset: 0; z-index: 15000;
            display: none; flex-direction: column;
            align-items: center; justify-content: center;
            background: rgba(4,6,58,0.97);
        }
        /* Banner de llamada — no tapa la pregunta */
        #llamada-banner {
            position: fixed; top: 0; left: 0; right: 0; z-index: 15000;
            display: none; align-items: center; justify-content: space-between;
            background: linear-gradient(90deg, #003d1a, #006630);
            border-bottom: 3px solid #00ff88;
            padding: clamp(6px,1.2vh,14px) clamp(12px,2vw,30px);
            box-shadow: 0 4px 30px rgba(0,255,136,0.4);
        }
        #llamada-banner .lb-icon { font-size: clamp(1.5rem,3vw,3rem); }
        #llamada-banner .lb-label { font-size: clamp(1rem,2.5vw,2.5rem); color:#00ff88; letter-spacing:3px; text-shadow:0 0 15px #00ff88; }
        #llamada-banner .lb-timer { font-family:'Inter'; font-weight:900; font-size: clamp(1.5rem,3vw,3rem); transition:color .5s; }

        /* MENSAJE */
        #tv-message-overlay {
            position: fixed; inset: 0; z-index: 20000;
            display: none; align-items: center; justify-content: center;
            background: rgba(4,6,58,0.92);
        }
        #tv-message-overlay span {
            font-size: clamp(2rem, 6vw, 6rem); color: var(--gold);
            text-align: center; padding: 0 5vw;
            text-shadow: 0 0 30px rgba(245,197,24,0.6);
        }

        /* FLASH PULSO */
        #pulse-flash { position: fixed; inset: 0; z-index: 99998; pointer-events: none; opacity: 0; transition: opacity 0.3s; }

        /* LOGO OVERLAY */
        #logo-overlay {
            position: fixed; inset: 0; z-index: 50000;
            background: #04063a;
            display: none; flex-direction: column;
            align-items: center; justify-content: center;
            animation: fadeIn 0.5s;
        }
        #logo-overlay.visible { display: flex; }
        #logo-title {
            font-size: clamp(4rem, 12vw, 14rem);
            color: var(--gold);
            text-shadow: 0 0 40px rgba(245,197,24,0.8), 0 0 80px rgba(245,197,24,0.4);
            letter-spacing: 4px; text-align: center; line-height: 1;
            animation: logoPulse 2s ease-in-out infinite;
        }
        #logo-sub {
            font-size: clamp(1rem, 3vw, 3rem);
            color: var(--border); letter-spacing: 8px; margin-top: 2vh;
            text-shadow: 0 0 20px var(--border);
        }
        @keyframes logoPulse {
            0%,100% { text-shadow: 0 0 40px rgba(245,197,24,0.8), 0 0 80px rgba(245,197,24,0.4); }
            50%      { text-shadow: 0 0 60px rgba(245,197,24,1),   0 0 120px rgba(245,197,24,0.6); }
        }

        /* PODIO */
        #podio-overlay {
            position:fixed;inset:0;z-index:60000;
            background:radial-gradient(ellipse at center,#0d1580 0%,#04063a 100%);
            display:none;flex-direction:column;align-items:center;justify-content:center;
        }
        #podio-overlay.visible{display:flex;animation:fadeIn .6s;}
        .podio-title{font-size:clamp(2rem,6vw,6rem);color:var(--gold);letter-spacing:4px;margin-bottom:4vh;text-shadow:0 0 30px rgba(245,197,24,.6);}
        .podio-wrap{display:flex;align-items:flex-end;gap:3vw;justify-content:center;}
        .podio-col{display:flex;flex-direction:column;align-items:center;gap:1vh;}
        .podio-name{font-size:clamp(1rem,2.5vw,2.5rem);letter-spacing:2px;}
        .podio-pts{font-size:clamp(1.5rem,4vw,4rem);color:var(--gold);font-family:'Inter';font-weight:900;}
        .podio-bar{width:clamp(60px,10vw,120px);border-radius:8px 8px 0 0;display:flex;align-items:center;justify-content:center;font-size:clamp(1.5rem,4vw,4rem);}
        .podio-pos{font-size:clamp(2rem,5vw,5rem);color:var(--gold);}

        /* CUENTA ATRÁS */
        #countdown-overlay {
            position:fixed;inset:0;z-index:60000;
            background:radial-gradient(ellipse at center,#0d1580 0%,#04063a 100%);
            display:none;align-items:center;justify-content:center;
        }
        #countdown-overlay.visible{display:flex;}
        #countdown-num{font-family:'Inter';font-weight:900;font-size:clamp(10rem,40vw,35rem);color:var(--gold);text-shadow:0 0 60px rgba(245,197,24,.8);animation:countPulse .8s ease-out;}
        @keyframes countPulse{from{transform:scale(1.4);opacity:0;}to{transform:scale(1);opacity:1;}}

        /* MODO ENSAYO */
        #rehearsal-badge{
            position:fixed;top:0;left:0;right:0;z-index:99990;
            background:repeating-linear-gradient(45deg,#ff6600,#ff6600 10px,#000 10px,#000 20px);
            color:white;text-align:center;font-family:'Bebas Neue';
            font-size:clamp(.8rem,2vw,1.4rem);letter-spacing:3px;
            padding:4px;display:none;
        }

        /* DESEMPATE */
        #tiebreak-overlay{
            position:fixed;inset:0;z-index:55000;
            background:radial-gradient(ellipse at center,#3d0000 0%,#1a0000 100%);
            display:none;flex-direction:column;align-items:center;justify-content:center;gap:2vh;
        }
        #tiebreak-overlay.visible{display:flex;animation:fadeIn .5s;}

        /* QR */
        #qr-overlay {
            position: fixed; inset: 0; background: rgba(4,6,58,0.97);
            z-index: 10000; display: none;
            flex-direction: column; align-items: center; justify-content: center;
        }

        @keyframes fadeIn    { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideInUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideInOps{ from { opacity: 0; transform: translateY(60px) scale(0.9); } to { opacity: 1; transform: translateY(0) scale(1); } }
        @keyframes slideUp   { from { opacity: 0; transform: translateY(80px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes shake     { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-6px)} 80%{transform:translateX(6px)} }
        @keyframes confettiFall { to { transform: translateY(110vh) rotate(720deg); opacity:0; } }
    </style>
</head>
<body>

<!-- Overlay de activación de audio — descarga todo antes de entrar -->
<div id="audio-unlock" onclick="unlockAudio()" style="position:fixed;inset:0;z-index:99999;background:rgba(4,6,58,0.97);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;gap:2vh;">
    <div style="font-size:clamp(3rem,8vw,7rem);">⚡</div>
    <div id="unlock-title" style="font-family:'Bebas Neue';font-size:clamp(1.5rem,4vw,4rem);color:#f5c518;letter-spacing:4px;">CARGANDO...</div>
    <div style="width:min(400px,70vw);background:rgba(255,255,255,.08);border-radius:4px;height:12px;overflow:hidden;">
        <div id="unlock-bar" style="height:100%;width:0%;background:linear-gradient(90deg,#00aaff,#00f2ff);border-radius:4px;transition:width .3s;box-shadow:0 0 16px #00aaff;"></div>
    </div>
    <div id="unlock-detail" style="font-size:clamp(.7rem,1.5vw,1rem);color:#555;letter-spacing:1px;">Preparando audio...</div>
</div>

<div id="rehearsal-badge">⚠️ MODO ENSAYO — Los puntos NO se guardan ⚠️</div>

<div id="countdown-overlay">
    <div id="countdown-num">3</div>
</div>

<div id="podio-overlay">
    <div class="podio-title">🏆 RESULTADO FINAL</div>
    <div class="podio-wrap" id="podio-wrap"></div>
</div>

<div id="tiebreak-overlay">
    <div style="font-size:clamp(2rem,5vw,5rem);color:#ff3131;letter-spacing:4px;text-shadow:0 0 20px #ff3131;">⚡ DESEMPATE</div>
    <div id="tiebreak-names" style="font-size:clamp(1rem,3vw,3rem);color:white;text-align:center;"></div>
    <div style="font-size:clamp(.8rem,1.5vw,1.5rem);color:#888;letter-spacing:2px;">El primero en pulsar responde</div>
</div>

<div id="logo-overlay">
    <div id="logo-title">¿QUIÉN QUIERE<br>LA PASTA?</div>
    <div id="logo-sub">EL SHOW</div>
</div>

<div id="main-grid"></div>

<div id="scene-question">
    <div id="q-pts-bg"></div>
    <div id="timer-display"></div>
    <div id="timer-bar-wrap"><div id="timer-bar"></div></div>
    <h1 id="splash-cat">CATEGORIA</h1>
    <div id="q-content">
        <div id="q-text"></div>
        <div id="opciones-box">
            <div id="opciones-grid">
                <div id="op-1-card" class="op-card"><span class="op-letter">A)</span><span id="opt-1"></span></div>
                <div id="op-2-card" class="op-card"><span class="op-letter">B)</span><span id="opt-2"></span></div>
                <div id="op-3-card" class="op-card"><span class="op-letter">C)</span><span id="opt-3"></span></div>
                <div id="op-4-card" class="op-card"><span class="op-letter">D)</span><span id="opt-4"></span></div>
            </div>
        </div>
    </div>
    <div id="who-pressed"></div>
</div>

<div id="feedback-wrap">
    <h1 id="fb-text"></h1>
</div>

<div id="scores-bar">
    <div class="p-card"><div>KINVERLYS</div><span id="tv-s-0">0</span></div>
    <div class="p-card"><div>MARÍA</div><span id="tv-s-1">0</span></div>
    <div class="p-card"><div>JOISE</div><span id="tv-s-2">0</span></div>
</div>

<audio id="tv-music" style="display:none;"></audio>

<div id="music-badge" style="position:fixed;bottom:2vh;right:2vw;z-index:99999;background:rgba(4,6,58,0.95);border:2px solid #00ff88;border-radius:12px;padding:8px 16px;font-family:'Bebas Neue';font-size:clamp(1rem,2vw,1.6rem);color:#00ff88;display:none;letter-spacing:2px;box-shadow:0 0 20px rgba(0,255,136,0.3);transition:opacity 0.3s;"></div>

<div id="pulse-flash"></div>

<div id="llamada-banner">
    <span class="lb-icon">📞</span>
    <span class="lb-label">LLAMADA EN CURSO</span>
    <span class="lb-timer" id="llamada-timer">30</span>
</div>

<div id="comodin-overlay">
    <div id="comodin-icon"></div>
    <div id="comodin-label"></div>
    <div id="comodin-timer"></div>
</div>

<div id="tv-message-overlay"><span></span></div>

<div id="qr-overlay">
    <h1 style="color:var(--gold); font-size:clamp(1.5rem,4vw,4rem); margin-bottom:3vh;">ESCANEA TU PULSADOR</h1>
    <div style="display:flex; gap:4vw;">
        <div style="text-align:center;"><h2 style="color:var(--p0); font-size:clamp(1rem,2.5vw,2.5rem);">KINVERLYS</h2><img id="qr0" style="border:8px solid white; border-radius:10px; width:clamp(120px,18vw,250px);"><div id="qr-url-0" style="font-size:.6rem;color:#555;margin-top:4px;word-break:break-all;max-width:clamp(120px,18vw,250px);"></div></div>
        <div style="text-align:center;"><h2 style="color:var(--p1); font-size:clamp(1rem,2.5vw,2.5rem);">MARÍA</h2><img id="qr1" style="border:8px solid white; border-radius:10px; width:clamp(120px,18vw,250px);"><div id="qr-url-1" style="font-size:.6rem;color:#555;margin-top:4px;word-break:break-all;max-width:clamp(120px,18vw,250px);"></div></div>
        <div style="text-align:center;"><h2 style="color:var(--p2); font-size:clamp(1rem,2.5vw,2.5rem);">JOISE</h2><img id="qr2" style="border:8px solid white; border-radius:10px; width:clamp(120px,18vw,250px);"><div id="qr-url-2" style="font-size:.6rem;color:#555;margin-top:4px;word-break:break-all;max-width:clamp(120px,18vw,250px);"></div></div>
    </div>
    <button onclick="document.getElementById('qr-overlay').style.display='none'" style="margin-top:4vh; padding:12px 28px; background:var(--red); color:white; border:none; border-radius:10px; font-family:'Bebas Neue'; font-size:1.4rem; cursor:pointer;">CERRAR</button>
</div>

<script>
const ably = new Ably.Realtime('hfiiHQ.aSZm9g:kMhwAKjhl_4t-ALEqCv_M_55VJlSYMKunV-PLoJJeVM');
const channel = ably.channels.get('juego-pasta');
const colors = ["#a020f0","#ff69b4","#4488ff"];
let tInt = null, comodinInt = null;
let localScores = [0,0,0];
let usedQuestions = [];
let ambientNodes = [];

function updateScoreUI() {
    localScores.forEach((v,i) => {
        const el = document.getElementById('tv-s-'+i);
        if(!el) return;
        el.innerText = v;
        el.className = v < 0 ? 'negative' : '';
    });
}

channel.subscribe('tv', (msg) => {
    const d = msg.data;

    if(d.type === 'init') {
        usedQuestions = d.usedQ || [];
        if(d.scores) localScores = d.scores;
        const grid = document.getElementById('main-grid');
        grid.innerHTML = '';
        const cols = d.cats.length;
        grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
        d.cats.forEach((c, i) => {
            const col = document.createElement('div');
            col.className = 'col-cat';
            col.innerHTML = `<div class="cat-header">${c}</div>`;
            [200,400,600,800,1000].forEach(p => {
                const qId = `q-${i}-${p}`;
                col.innerHTML += `<div class="q-cell ${usedQuestions.includes(qId)?'used':''}" id="${qId}">${p}</div>`;
            });
            grid.appendChild(col);
        });
        updateScoreUI();
    }

    if(d.type === 'open_q') {
        const qId = `q-${d.catIdx}-${d.pts}`;
        if(!usedQuestions.includes(qId)) usedQuestions.push(qId);
        const cell = document.getElementById(qId);
        if(cell) cell.classList.add('used');
        document.getElementById('scene-question').classList.add('active');
        document.getElementById('scene-question').style.display = 'flex';
        document.getElementById('splash-cat').innerText = d.cat;
        document.getElementById('splash-cat').className = '';
        document.getElementById('q-pts-bg').innerText = d.pts;
        document.getElementById('q-text').innerText = d.txt;
        document.getElementById('opt-1').innerText = d.o1||'';
        document.getElementById('opt-2').innerText = d.o2||'';
        document.getElementById('opt-3').innerText = d.o3||'';
        document.getElementById('opt-4').innerText = d.o4||'';
        document.getElementById('q-content').style.display = 'none';

// AUDIO
const sfx = { suspenso: new Audio('suspenso.mp3'), correcto: new Audio('correcto.mp3'), incorrecto: new Audio('incorrecto.mp3') };
const audioCtx = new (window.AudioContext||window.webkitAudioContext)();
function playPulso(color) {
    const o=audioCtx.createOscillator(), g=audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type='sine'; o.frequency.value=880;
    g.gain.setValueAtTime(0.4,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.3);
    o.start(audioCtx.currentTime); o.stop(audioCtx.currentTime+0.3);
    const f=document.getElementById('pulse-flash');
    f.style.background=color; f.style.opacity='0.3';
    setTimeout(()=>f.style.opacity='0',300);
}
function playSuspenso()   { sfx.suspenso.currentTime=0; sfx.suspenso.play(); }
function playCorrecto()   { sfx.suspenso.pause(); sfx.correcto.currentTime=0; sfx.correcto.play(); }
function playIncorrecto() { sfx.suspenso.pause(); sfx.incorrecto.currentTime=0; sfx.incorrecto.play(); }

function unlockAudio() {
    // Solo reacciona al toque cuando ya está listo
    const title = document.getElementById('unlock-title');
    if(title.innerText === 'CARGANDO...') return;
    document.getElementById('audio-unlock').style.display = 'none';
    audioCtx.resume();
}

// Precargar todos los recursos al cargar la página
async function preloadAll() {
    const bar   = document.getElementById('unlock-bar');
    const detail= document.getElementById('unlock-detail');
    const title = document.getElementById('unlock-title');

    // Esperar a que Ably esté conectado antes de continuar
    detail.innerText = 'Conectando al servidor...';
    bar.style.width = '5%';
    await new Promise(resolve => {
        if(ably.connection.state === 'connected') { resolve(); return; }
        ably.connection.once('connected', resolve);
        setTimeout(resolve, 5000); // timeout por si falla
    });

    const resources = [
        { label: 'suspenso.mp3',   audio: sfx.suspenso },
        { label: 'correcto.mp3',   audio: sfx.correcto },
        { label: 'incorrecto.mp3', audio: sfx.incorrecto },
    ];

    // Añadir canciones del JSON
    try {
        const r = await fetch('canciones.json');
        const canciones = await r.json();
        canciones.forEach(c => {
            const a = new Audio();
            resources.push({ label: c.nombre, audio: a, src: c.archivo });
        });
    } catch(e) {}

    let loaded = 0;
    const total = resources.length;

    for(const res of resources) {
        detail.innerText = res.label;
        await new Promise(resolve => {
            const a = res.audio;
            if(res.src) a.src = res.src;
            a.addEventListener('canplaythrough', () => resolve(), {once:true});
            a.addEventListener('error', () => resolve(), {once:true}); // no bloquear si falla
            a.load();
            // Timeout por si tarda demasiado
            setTimeout(resolve, 3000);
        });
        loaded++;
        bar.style.width = (loaded/total*100) + '%';
    }

    title.innerText = 'TOCA PARA EMPEZAR';
    detail.innerText = '✅ Todo listo — toca para activar el audio';
    document.getElementById('audio-unlock').style.cursor = 'pointer';
}

preloadAll();

function showMusicBadge(text, color) {
    const b = document.getElementById('music-badge');
    b.innerText = text;
    b.style.borderColor = color;
    b.style.color = color;
    b.style.boxShadow = `0 0 20px ${color}44`;
    b.style.display = 'block';
}
function hideMusicBadge() {
    document.getElementById('music-badge').style.display = 'none';
}

// Sonido de reloj (tick cada segundo)
let tickInterval = null;
function startTickSound() {
    stopTickSound();
    tickInterval = setInterval(() => {
        const o=audioCtx.createOscillator(), g=audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        o.type='square'; o.frequency.value=1200;
        g.gain.setValueAtTime(0.08, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+0.06);
        o.start(audioCtx.currentTime); o.stop(audioCtx.currentTime+0.07);
    }, 1000);
}
function stopTickSound() {
    if(tickInterval) { clearInterval(tickInterval); tickInterval=null; }
}
function playBeep() {
    [0, 0.18, 0.36, 0.54, 0.72].forEach(t => {
        const o=audioCtx.createOscillator(), g=audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        o.type='sine'; o.frequency.value=880;
        g.gain.setValueAtTime(0.35, audioCtx.currentTime+t);
        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+t+0.15);
        o.start(audioCtx.currentTime+t); o.stop(audioCtx.currentTime+t+0.16);
    });
}

function launchConfetti() {
    // Sonido de fanfarria
    const notes = [523,659,784,1047,1319];
    notes.forEach((f,i) => {
        const o=audioCtx.createOscillator(), g=audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        o.type='square'; o.frequency.value=f;
        g.gain.setValueAtTime(0.18, audioCtx.currentTime+i*0.1);
        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+i*0.1+0.2);
        o.start(audioCtx.currentTime+i*0.1);
        o.stop(audioCtx.currentTime+i*0.1+0.22);
    });
    // Visual
    const cols = ['#ffc300','#00f2ff','#ff69b4','#00ff88','#ff3131','#ffffff','#a020f0'];
    for(let i=0;i<150;i++) {
        const el = document.createElement('div');
        el.style.cssText = `position:fixed;width:${5+Math.random()*9}px;height:${5+Math.random()*9}px;
            background:${cols[Math.floor(Math.random()*cols.length)]};
            left:${Math.random()*100}vw;top:-20px;z-index:99999;border-radius:${Math.random()>0.5?'50%':'2px'};
            animation:confettiFall ${1.5+Math.random()*2.5}s linear forwards;
            transform:rotate(${Math.random()*360}deg);`;
        document.body.appendChild(el);
        setTimeout(()=>el.remove(), 5000);
    }
}

</script>
